<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Account Lookup</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  padding: 40px;
}

h1 {
  color: #00ff88;
}

input {
  padding: 12px;
  width: 250px;
  border-radius: 6px;
  border: none;
  outline: none;
}

button {
  padding: 12px 18px;
  margin-left: 8px;
  background: #00ff88;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #00cc6a;
}

#card {
  margin-top: 40px;
  padding: 25px;
  background: #1a1a1a;
  display: inline-block;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,255,136,0.3);
  animation: fadeIn 0.4s ease-in-out;
}

img {
  border-radius: 10px;
  margin-top: 10px;
}

.loading {
  margin-top: 20px;
  font-size: 14px;
  color: #aaa;
}

.error {
  margin-top: 20px;
  color: red;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<h1>Roblox Account Lookup</h1>
<p>Tra cứu thông tin tài khoản Roblox</p>

<input type="text" id="username" placeholder="Nhập username...">
<button onclick="lookup()">Tìm</button>

<div id="result"></div>

<script>
async function lookup() {
  const username = document.getElementById("username").value.trim();
  const resultDiv = document.getElementById("result");

  if (!username) {
    resultDiv.innerHTML = "<div class='error'>Vui lòng nhập username</div>";
    return;
  }

  resultDiv.innerHTML = "<div class='loading'>Đang tải...</div>";

  try {
    const res = await fetch(`/api/user?username=${encodeURIComponent(username)}`);
    const data = await res.json();

    if (data.error) {
      resultDiv.innerHTML = `<div class='error'>${data.error}</div>`;
      return;
    }

    resultDiv.innerHTML = `
      <div id="card">
        <h2>${data.name}</h2>
        <img src="${data.avatar}" width="160">
        <p><b>User ID:</b> ${data.id}</p>
        <p><b>Display Name:</b> ${data.displayName}</p>
        <p><b>Ngày tạo:</b> ${new Date(data.created).toLocaleDateString()}</p>
      </div>
    `;

  } catch (err) {
    resultDiv.innerHTML = "<div class='error'>Lỗi server</div>";
  }
}
</script>

</body>
</html>
